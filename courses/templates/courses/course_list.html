<!DOCTYPE html>
<html>
<head>
<title>Courses</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
    text-align:center;
}

header{
    background:#2c3e50;
    color:white;
    padding:20px;
    font-size:26px;
}

.container{
    margin-top:40px;
}

.course{
    background:white;
    width:300px;
    margin:15px auto;
    padding:15px;
    border-radius:8px;
    box-shadow:0px 2px 6px rgba(0,0,0,0.2);
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;
    background:#3498db;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:#2980b9;
}

</style>

</head>

<body>

<header>Courses</header>

<div class="container">

{% for course in courses %}

<div class="course">
<h3>{{ course.title }}</h3>

<a class="btn" href="/courses/{{ course.id }}/enroll/">Enroll</a>

</div>

{% empty %}

<p>No courses available</p>

{% endfor %}

<br>
<a class="btn" href="/">Back to Dashboard</a>

</div>

</body>
</html>
