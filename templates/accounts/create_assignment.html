<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Assignment</title>
    <style>
         body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f4f6f9;
            margin:0;
            padding:0;
        }
        .container{
            width:50%;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }
        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }
         label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }
        input, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
        }
        textarea{
            resize:none;
        }
        .submit-btn{
            margin-top:20px;
            width:100%;
            background:#4CAF50;
            color:white;
            border:none;
            padding:12px;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
        }
        .submit-btn:hover{
            background:#45a049;
        }
        .back-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#555;
        }
        .back-btn:hover{
            color:black;
        }
    </style>
</head>
<body>
   <div class="container">
    <h2>Create Assignment</h2>
    <form method="post">
        {% csrf_token %}
        <label>Assignment Title</label>
        <input type="text" name="title" required>

        <label>Description</label>
        <textarea name="description" rows="4"></textarea>

        <label>Due Date</label>
        <input type="date" name="due_date">

        <button class="submit-btn" type="submit">
            Create Assignment
        </button>
    </form>
    <a href="{% url 'dashboard' %}" class="back-btn">
         ← Back to Dashboard
    </a>
   </div>
</body>
</html>
