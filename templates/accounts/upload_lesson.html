<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Lesson</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container{
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            width: 450px;
        }
        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        form p{
            margin-bottom: 15px;
        }
        label{
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea, select{
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus{
            outline: none;
            border-color: #5b86e5;
            box-shadow: 0 0 5px rgba(91,134,229,0.5);
        }
        button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #5b86e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            background-color: #4a75d1;
        }
        .error-box{
            margin-top: 20px;
            padding: 15px;
            background-color: #ffe6e6;
            border-left: 5px solid #ff4d4d;
            border-radius: 6px;
        }
        .error-box h3{
            margin-top: 0;
            color: #cc0000;
        }
        .error-box ul{
            margin: 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Lesson</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Upload</button>
        </form>
         {% if form.errors %}
        <div class="error-box">
            <h3>Errors:</h3>
            <ul>
                {% for field in form %}
                    {% for error in field.errors %}
                        <li>{{ field.label }}: {{ error }}</li>
                    {% endfor %}
                {% endfor %}
                {% for error in form.non_field_errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
