<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:500px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

form p{
    margin-bottom:15px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#333;
}

.back-link:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Quiz</h2>

<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}

    <button type="submit">Create Quiz</button>
</form>

<a href="{% url 'dashboard' %}" class="back-link">
Back to Dashboard
</a>

</div>

</body>
</html>
