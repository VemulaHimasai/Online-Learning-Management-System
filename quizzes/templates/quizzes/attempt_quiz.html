<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }
        .container{
            width: 700px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        h2{
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .question-box{
            background-color: #f8f9fa;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 5px solid #ff6f61;
        }
        .question-box p{
            margin: 0 0 10px;
            font-weight: bold;
            color: #333;
        }
        label{
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 6px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        label:hover{
            background-color: #ffe8e6;
        }
        input[type="radio"]{
            margin-right: 8px;
        }
        button{
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #ff6f61;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            background-color: #e85c50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{ quiz.title }}</h2>

        <form method="post">
            {% csrf_token %}
            {% for question in questions %}
            <div class="question-box">
                <p>{{ question.text }}</p>

                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ question.option1 }}">
                   {{ question.option1 }} 
                </label>
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ question.option2 }}">
                   {{ question.option2 }} 
                </label>
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ question.option3 }}">
                    {{ question.option3 }}
                </label>
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ question.option4 }}">
                    {{ question.option4 }}
                </label>
            </div>
            {% endfor %}
            <button type="submit">Submit Quiz</button>
        </form>
    </div>
</body>
</html>
